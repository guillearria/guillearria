# Weekly refresh of the auto-updated README block. Pure python, zero LLM cost.
name: update-readme
on:
  schedule:
    - cron: "0 14 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh HQ block
        run: python3 scripts/update_readme.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "readme: weekly auto-update"
            git push
          fi
